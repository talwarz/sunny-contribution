<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contribution for Sunny Matta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#fff;margin:0;padding:20px;text-align:center}
.page{max-width:720px;margin:auto}
.photo{width:250px;max-width:90%;border-radius:18px;box-shadow:0 8px 25px #ccc}
h1{color:#2b5737;font-size:42px}
.qr{width:230px;border-radius:16px;margin:15px}
.form-card,.contributors{max-width:560px;margin:25px auto;background:#fff;padding:20px;border-radius:16px;box-shadow:0 8px 24px #ddd}
input,button{width:100%;padding:13px;margin:8px 0;border-radius:9px;border:1px solid #ccc;text-align:center;font-size:16px}
button{background:#245b35;color:white;font-weight:bold;border:0}
.note{color:#555}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border-bottom:1px solid #ddd;padding:10px;text-align:center}
th{background:#245b35;color:white}
</style>
</head>

<body>
<div class="page">

<img src="sunny-matta.png" class="photo">

<h3>CONTRIBUTION FOR</h3>
<h1>SUNNY MATTA</h1>

<p class="note">We are collecting support for Sunny Matta's family.</p>

<img src="qr.png" class="qr">
<p>💛 Scan QR and make contribution 💛</p>

<div class="form-card">
<form action="/submit" method="POST">
<input name="name" placeholder="Name" required>
<input name="company" placeholder="Company Name" required>
<input name="city" placeholder="City" required>
<input name="mobile" placeholder="Mobile Number" pattern="[0-9]{10}" maxlength="10" required>
<input name="amount" type="number" placeholder="Amount ₹" required>
<button type="submit">SUBMIT DETAILS</button>
</form>
</div>

<p class="note">Payment approve hone ke baad naam list me show hoga.</p>
<p><b>Confirmation: +91 8851235015</b></p>

<div class="contributors">
<h2>🌸 Contributors 🌸</h2>
<p class="note">Approved contributors list</p>

<table>
<thead>
<tr>
<th>S.No</th>
<th>Name</th>
<th>Company</th>
<th>City</th>
</tr>
</thead>
<tbody id="contributorsList">
<tr><td colspan="4">Loading...</td></tr>
</tbody>
</table>
</div>

</div>

<script>
async function loadContributors(){
  const res = await fetch("/contributors");
  const data = await res.json();
  const box = document.getElementById("contributorsList");

  if(!data.length){
    box.innerHTML = "<tr><td colspan='4'>No approved contributors yet.</td></tr>";
    return;
  }

  box.innerHTML = data.map((item,index)=>`
    <tr>
      <td>${index+1}</td>
      <td><b>${item.name}</b></td>
      <td>${item.company}</td>
      <td>${item.city}</td>
    </tr>
  `).join("");
}
loadContributors();
</script>

</body>
</html>
